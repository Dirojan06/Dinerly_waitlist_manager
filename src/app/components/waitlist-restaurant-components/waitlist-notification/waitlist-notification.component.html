<div class="page">
  <div class="topbar">
    <h1 class="page-title">Notify Queue</h1>
    <button class="btn-notify-all">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      Notify all
    </button>
  </div>

  <div class="content" style="padding-top: 14px;">
    <p class="queue-subtitle">Guests ready to be notified — table available</p>

    <div *ngIf="queue.length === 0" class="empty-state">No guests pending notification</div>

    <div class="notify-card" *ngFor="let guest of queue; trackBy: trackByGuest">
      <div class="avatar" [style.background]="getAvatarColor(guest.id).bg"
        [style.color]="getAvatarColor(guest.id).color">
        {{ getInitials(guest.name) }}
      </div>
      <div class="notify-info">
        <div class="notify-name-row">
          <span class="notify-name">{{ guest.name }}</span>
          <span class="status-badge ready" *ngIf="guest.status === 'table-ready'">Table T6 ready</span>
          <span class="status-badge overdue" *ngIf="guest.status !== 'table-ready'">Overdue {{ guest.waitMinutes }}
            min</span>
        </div>
        <div class="notify-meta">
          {{ guest.partySize }} guests · waiting {{ guest.waitMinutes }} min · {{ guest.phone }}
        </div>
      </div>
      <div class="notify-actions">
        <button class="btn-sms">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          SMS
        </button>
        <button class="btn-call">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.7h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.4a16 16 0 0 0 6 6l1.27-.89a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17.92z" />
          </svg>
          Call
        </button>
      </div>
    </div>

    <!-- SMS Template -->
    <div class="sms-template-card">
      <h3 class="template-title">SMS message template</h3>
      <label class="template-label">Message</label>
      <!-- <textarea class="template-textarea" [(ngModel)]="smsTemplate" rows="3"></textarea> -->
      <button class="btn-save" (click)="saveTemplate()">Save template</button>
    </div>
  </div>
</div>
