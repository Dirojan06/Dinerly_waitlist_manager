<app-dinerly-loader *ngIf="isLoading"></app-dinerly-loader>

<div *ngIf="!isLoading" class="app-shell">

  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="100%" height="100%">

          <defs>
            <linearGradient id="i_t1" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#4A0FAD"></stop>
              <stop offset="100%" stop-color="#7C2FD6"></stop>
            </linearGradient>

            <linearGradient id="i_t2" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#9B45E8"></stop>
              <stop offset="100%" stop-color="#C47EED"></stop>
            </linearGradient>

            <linearGradient id="i_t3" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#D9AAFF"></stop>
              <stop offset="100%" stop-color="#F0D6FF"></stop>
            </linearGradient>
          </defs>

          <g transform="translate(72, 72) rotate(90)">
            <polygon points="0,-52 44,26 -44,26" fill="url(#i_t1)"></polygon>

            <polygon points="0,-28 30,20 -30,20" fill="url(#i_t2)" transform="translate(0,16)">
            </polygon>

            <polygon points="0,-16 18,11 -18,11" fill="url(#i_t3)" transform="translate(0,26)">
            </polygon>
          </g>
        </svg>
      </div>

      <div class="logo-text">
        <div class="logo-name">Dinerly</div>
        <div class="logo-subtitle">Waitlist Manager</div>
      </div>
    </div>

    <div class="restaurant-label">
      BROTHERS CAFÉ
    </div>

    <!-- Main navigation -->
    <nav class="sidebar-nav">

      <button type="button" class="nav-item" [class.active]="activeRoute === 'waitlist'" (click)="navigate('waitlist')">

        <span class="nav-icon">◉</span>
        <span class="nav-text">Waitlist</span>

        <span class="nav-badge" *ngIf="guestCount">
          {{ guestCount }}
        </span>
      </button>

      <button type="button" class="nav-item" [class.active]="activeRoute === 'tables'" (click)="navigate('tables')">

        <span class="nav-icon">▦</span>
        <span class="nav-text">Tables</span>
      </button>


      <button type="button" class="nav-item" [class.active]="activeRoute === 'history'" (click)="navigate('history')">

        <span class="nav-icon">↶</span>
        <span class="nav-text">History</span>
      </button>

      <!-- Settings parent -->
      <button type="button" class="nav-item settings-parent" [class.active]="activeRoute === 'settings'"
        (click)="toggleSettingsMenu()">

        <span class="nav-icon">⚙</span>
        <span class="nav-text">Settings</span>

        <span class="settings-arrow" [class.open]="showSettingsMenu">
          ⌃
        </span>
      </button>

      <!-- Desktop Settings submenu -->
      <div class="settings-submenu" [class.open]="showSettingsMenu">

        <button type="button" [class.active]="activeSettingsTab === 'profile'" (click)="openSettingsTab('profile')">
          Profile
        </button>

        <button type="button" [class.active]="activeSettingsTab === 'notification'"
          (click)="openSettingsTab('notification')">
          Notification
        </button>

        <button type="button" [class.active]="activeSettingsTab === 'waitlist'" (click)="openSettingsTab('waitlist')">
          Waitlist settings
        </button>

        <button type="button" [class.active]="activeSettingsTab === 'tables'" (click)="openSettingsTab('tables')">
          Tables
        </button>

        <button type="button" [class.active]="activeSettingsTab === 'holiday'" (click)="openSettingsTab('holiday')">
          Holiday hours
        </button>

        <button type="button" [class.active]="activeSettingsTab === 'advanced'" (click)="openSettingsTab('advanced')">
          Advanced setting
        </button>
      </div>

      <button type="button" class="nav-item help-item">
        <span class="nav-icon">?</span>
        <span class="nav-text">Help</span>
      </button>
    </nav>

    <!-- Bottom restaurant account -->
    <div class="sidebar-user">
      <div class="user-avatar">B</div>

      <div class="user-details">
        <strong></strong>
        <span>Restaurant Account</span>
      </div>
    </div>
  </aside>

  <main class="main-content">

    <!-- Tablet settings tabs -->
    <div class="tablet-settings-tabs" *ngIf="activeRoute === 'settings'">

      <button *ngFor="let tab of settingsTabs" type="button" [class.active]="activeSettingsTab === tab.value"
        (click)="openSettingsTab(tab.value)">
        {{ tab.label }}
      </button>
    </div>

    <router-outlet></router-outlet>
  </main>
</div>

<app-waitlist-restaurant-modal></app-waitlist-restaurant-modal>
