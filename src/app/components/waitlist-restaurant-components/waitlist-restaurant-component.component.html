<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="100%" height="100%">
          <defs>
            <linearGradient id="i_t1" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#4A0FAD" />
              <stop offset="100%" stop-color="#7C2FD6" />
            </linearGradient>
            <linearGradient id="i_t2" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#9B45E8" />
              <stop offset="100%" stop-color="#C47EED" />
            </linearGradient>
            <linearGradient id="i_t3" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#D9AAFF" />
              <stop offset="100%" stop-color="#F0D6FF" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="175" height="175" rx="36" fill="#ffffff00" />
          <g transform="translate(72, 72) rotate(90)">
            <polygon points="0,-52 44,26 -44,26" fill="url(#i_t1)" />
            <polygon points="0,-28 30,20 -30,20" fill="url(#i_t2)" transform="translate(0,16)" />
            <polygon points="0,-16 18,11 -18,11" fill="url(#i_t3)" transform="translate(0,26)" />
          </g>
        </svg>
      </div>
      <div style="margin-top: 20px">
        <div class="logo-name">Dinerly</div>
        <div>Waitlist Manager</div>
      </div>
      
      
    </div>


    <nav class="sidebar-nav">
      <button class="nav-item" [class.active]="activeRoute === 'dashboard'" (click)="navigate('dashboard')">
        Dashboard
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'waitlist'" (click)="navigate('waitlist')">
        Live Waitlist
        <span class="nav-badge">{{ guestCount }}</span>
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'tables'" (click)="navigate('tables')">
        Tables
        <span class="nav-badge">{{ openTablesCount }}</span>
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'notify'" (click)="navigate('notify')">
        Notification
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'history'" (click)="navigate('history')">
        History
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'reports'" (click)="navigate('reports')">
        Reports
      </button>

      <button class="nav-item" [class.active]="activeRoute === 'settings'" (click)="navigate('settings')">
        Settings
      </button>
    </nav>

    <!-- <div class="sidebar-user">
      <div class="user-avatar">RM</div>
      <div>
        <div class="restaurant-name">Ravi Manager</div>
        <div class="restaurant-status">Manager</div>
      </div>
    </div> -->
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<app-waitlist-restaurant-modal></app-waitlist-restaurant-modal>
