<div class="app-wrapper" [ngClass]="isDarkMode ? 'dark-mode' : 'light-mode'">

  <div class="customer-shell">

    <app-waitlist-user-sidebar [activeTab]="activeTab" [isLoggedGuest]="isLoggedGuest" (tabChange)="changeTab($event)">
    </app-waitlist-user-sidebar>

    <main class="customer-main">

      <app-waitlist-user-hero *ngIf="isLoggedGuest" [guest]="guest" (logout)="logoutGuest()">
      </app-waitlist-user-hero>

      <ng-container *ngIf="isLoggedGuest">

        <ng-container *ngIf="activeTab === 'WAITLIST'">
          <app-waitlist-user-banner></app-waitlist-user-banner>

          <app-waitlist-waiting-screen (leaveSuccess)="logoutGuest()">
          </app-waitlist-waiting-screen>
        </ng-container>

        <ng-container *ngIf="activeTab === 'MENU'">
          <app-waitlist-user-menu></app-waitlist-user-menu>
        </ng-container>

      </ng-container>

      <app-waitlist-user-action *ngIf="!isLoggedGuest" (guestJoined)="onGuestJoined($event)">
      </app-waitlist-user-action>

    </main>

  </div>

</div>

<div class="access-backdrop" *ngIf="showAccessPopup">
  <div class="access-popup">
    <button class="access-close" type="button" (click)="closeAccessPopup()">✕</button>

    <div class="access-icon">
      <i class="fa-solid fa-lock"></i>
    </div>

    <h2>Join the waitlist first</h2>
    <p>Please join the waitlist to access Waitlist, Menu and Discounts.</p>

    <button type="button" class="access-btn" (click)="closeAccessPopup()">
      Okay
    </button>
  </div>
</div>
