<aside class="sidebar">

  <div class="sidebar-card waiting-card">

    <div class="card-icon">
      <i class="fa-solid fa-chair"></i>
    </div>

    <h2>Your table is waiting</h2>

    <p>
      Join the waitlist or check your status
      to get notified.
    </p>

    <button class="btn-full-dark" (click)="openModal('join')">
      Join the waitlist
      <i class="fa-solid fa-arrow-right"></i>
    </button>

    <span class="or-divider">or</span>

    <button class="btn-full-outline" (click)="openModal('status')">
      Check my status
      <i class="fa-solid fa-arrow-right"></i>
    </button>

  </div>

  <div class="info-row clickable">
    <div class="info-icon">
      <i class="fa-regular fa-message"></i>
    </div>

    <div class="info-text">
      <strong>We’ll text you when your table is ready</strong>
      <span>Make sure your phone is up to date!</span>
    </div>

    <i class="fa-solid fa-chevron-right"></i>
  </div>

</aside>

<app-waitlist-modal
  *ngIf="showModal"
  [type]="modalType"
  (closeModal)="closeModal()"
  (joinedWaitlist)="onJoinedWaitlist($event)">
</app-waitlist-modal>
