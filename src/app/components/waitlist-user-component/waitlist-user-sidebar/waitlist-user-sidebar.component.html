<aside class="sidebar">

  <div class="sidebar-card waiting-card">
    <div class="decor left">❧</div>
    <div class="decor right">❧</div>

    <div class="card-icon">🗓️</div>

    <h2>Your table is waiting</h2>
    <p>Join the waitlist or check your status to get notified.</p>

    <button class="btn-full-dark" (click)="openModal('join')">
      Join the waitlist
      <span>→</span>
    </button>

    <span class="or-divider">or</span>

    <button class="btn-full-outline" (click)="openModal('status')">
      Check my status
      <span>→</span>
    </button>
  </div>

  <div class="info-row clickable" >
    <div class="info-icon">📱</div>
    <div class="info-text">
      <strong>We'll text you when your table is ready</strong>
      <span>Make sure your phone is up to date!</span>
    </div>
    <span>›</span>
  </div>

</aside>

<app-waitlist-modal
  *ngIf="showModal"
  [type]="modalType"
  (closeModal)="closeModal()"
  (joinedWaitlist)="onJoinedWaitlist($event)">
</app-waitlist-modal>
