<section class="hero">

  <div class="hero-overlay"></div>

  <div class="hero-content">

    <div class="logo-row">
      <div class="logo-icon">🍴</div>
      <h2>Dinerly</h2>
    </div>

    <h1>
      A better table <br />
      awaits <span>you</span>
    </h1>

    <div class="title-line"></div>

    <p class="tagline">
      Skip the wait, not the experience. <br />
      Join the waitlist and we’ll take care of the rest.
    </p>

    <div class="stats-card">

      <div class="stat">
        <div class="stat-icon">👥</div>
        <strong>{{ partiesWaiting }}</strong>
        <span>parties waiting</span>
      </div>

      <div class="stat-divider"></div>

      <div class="stat">
        <div class="stat-icon">🕒</div>
        <strong>{{ waitMinutes }} <small>min</small></strong>
        <span>average wait</span>
      </div>

    </div>

  </div>

  <div class="live-pill">
    <span></span>
    <b>Live wait times updated in real time</b>
  </div>

</section>
