<section class="hero">

  <div class="live-badge">
    <span></span>
    LIVE
  </div>

  <span class="update-text">Updates in real time</span>

  <div class="hero-content">

    <div class="hero-text">
      <p class="welcome-label">Welcome to</p>

      <h1 class="restaurant-name">
        The Maple Bistro
      </h1>

      <p class="tagline">
        Great food, warm vibes, and now — smarter waiting.
      </p>

      <div class="stats-row">

        <div class="stat-card">
          <div class="stat-icon">
            👥
          </div>
          <div>
            <strong>{{ partiesWaiting }}</strong>
            <span>parties waiting</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            ⏱
          </div>
          <div>
            <strong>~{{ waitMinutes }}</strong>
            <span>min average wait</span>
          </div>
        </div>

      </div>
    </div>

    <div class="hero-image"></div>

  </div>

</section>
