<section class="hero">

  <div class="hero-content">

    <h1>
      A better table <br />
      awaits <span>you</span>
    </h1>

    <div class="title-line"></div>

    <p class="tagline">
      Skip the wait, not the experience. <br />
      Join the waitlist and we’ll take care of the rest.
    </p>

    <div class="stats-card">

      <div class="stat">
        <div class="stat-icon">
          <i class="fa-solid fa-user-group"></i>
        </div>
        <strong>{{ partiesWaiting }}</strong>
        <span>parties waiting</span>
      </div>

      <div class="stat-divider"></div>

      <div class="stat">
        <div class="stat-icon">
          <i class="fa-regular fa-clock"></i>
        </div>
        <strong>{{ waitMinutes }} <small>min</small></strong>
        <span>average wait</span>
      </div>

    </div>

  </div>

</section>
